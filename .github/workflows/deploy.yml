name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; don't cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          # All optional. Left unset → keyless public build: DEMO mode works
          # fully; LIVE scanning/AI needs a user-supplied key (Settings) or the
          # proxy. Set these as repo Secrets/Variables to bake in live data
          # WITHOUT committing keys. Use the proxy (a public URL → repo Variable)
          # to avoid shipping any secret in the bundle.
          VITE_PROXY_URL: ${{ vars.VITE_PROXY_URL }}
          VITE_INFURA_KEY: ${{ secrets.VITE_INFURA_KEY }}
          VITE_VENICE_API_KEY: ${{ secrets.VITE_VENICE_API_KEY }}
          VITE_ALCHEMY_API_KEY: ${{ secrets.VITE_ALCHEMY_API_KEY }}
          VITE_ETHERSCAN_API_KEY: ${{ secrets.VITE_ETHERSCAN_API_KEY }}
          VITE_PIMLICO_API_KEY: ${{ secrets.VITE_PIMLICO_API_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
